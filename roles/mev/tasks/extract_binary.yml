---
- name: Add Docker repository
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ ansible_distribution_release }}"
    components: stable
    architectures: amd64
    signed_by: https://download.docker.com/linux/ubuntu/gpg
    state: present
    enabled: true

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create MEV service docker container and copy binary
  vars:
    container_name: mev_service
  block:
    - name: Create temporary container for binary extraction
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ monad.validator.mev.source_url }}:{{ monad.validator.mev.version }}"
        state: present
        recreate: true

    - name: Copy MEV service binary
      ansible.builtin.shell: >
        docker cp {{ container_name }}:/app/app {{ mev_bin_dir }}/{{ service_identifier }}
      args:
        executable: /bin/bash
      register: copy_result
      changed_when: copy_result.rc == 0
      failed_when:
        - copy_result.rc != 0
        - "'No such container' in copy_result.stderr"
      notify:
        - Restart service

    - name: Ensure MEV service binary has the correct permissions
      ansible.builtin.file:
        path: "{{ mev_bin_dir }}/{{ service_identifier }}"
        owner: root
        group: root
        mode: "0755"
      notify:
        - Restart service

  always:
    - name: Remove MEV service container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent
